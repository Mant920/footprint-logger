<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — EcoTrace</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }
    .auth-wrap {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 2rem;
      background: radial-gradient(ellipse 70% 60% at 50% 30%, rgba(64,145,108,0.12) 0%, transparent 70%);
    }
    .auth-box {
      width: 100%; max-width: 440px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2.5rem;
    }
    .auth-logo { text-align: center; margin-bottom: 2rem; }
    .auth-logo a {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--green-neon);
      text-decoration: none;
    }
    .auth-logo p { color: var(--muted); font-size: 0.9rem; margin-top: 0.4rem; }
    .auth-title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
    }
    .auth-sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.8rem; }
    .auth-footer { text-align: center; margin-top: 1.5rem; font-size: 0.88rem; color: var(--muted); }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="/" class="nav-brand"><span>🌿</span> EcoTrace</a>
  </nav>

  <div class="auth-wrap">
    <div class="auth-box">
      <div class="auth-logo">
        <a href="/">🌿 EcoTrace</a>
        <p>Carbon Footprint Logger</p>
      </div>

      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-sub">Sign in to your account to continue tracking.</p>

      <div id="alertBox"></div>

      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="email" class="form-input" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-input" placeholder="••••••••" autocomplete="current-password">
      </div>

      <button id="loginBtn" class="btn btn-primary btn-full mt-2" style="font-size:1rem; padding: 0.8rem;">
        Sign In
      </button>

      <div class="auth-footer">
        Don't have an account? <a href="/register">Create one free</a>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    redirectIfLoggedIn();

    const alertBox   = document.getElementById('alertBox');
    const loginBtn   = document.getElementById('loginBtn');
    const emailInput = document.getElementById('email');
    const passInput  = document.getElementById('password');

    function showAlert(msg, type = 'error') {
      alertBox.innerHTML = `<div class="alert alert-${type}"><span>${type === 'error' ? '⚠' : '✓'}</span>${msg}</div>`;
    }

    async function doLogin() {
      const email    = emailInput.value.trim();
      const password = passInput.value;

      if (!email || !password) { showAlert('Please fill in all fields.'); return; }

      loginBtn.disabled = true;
      loginBtn.textContent = 'Signing in…';
      alertBox.innerHTML = '';

      try {
        const res = await API.auth.login({ email, password });
        API.setToken(res.token);
        API.setUser(res.user);
        window.location.href = '/dashboard';
      } catch (err) {
        showAlert(err.message || 'Login failed. Please try again.');
        loginBtn.disabled = false;
        loginBtn.textContent = 'Sign In';
      }
    }

    loginBtn.addEventListener('click', doLogin);
    [emailInput, passInput].forEach(el => {
      el.addEventListener('keydown', (e) => { if (e.key === 'Enter') doLogin(); });
    });
  </script>
</body>
</html>
