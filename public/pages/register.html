<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — EcoTrace</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }
    .auth-wrap {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 2rem;
      background: radial-gradient(ellipse 70% 60% at 50% 30%, rgba(64,145,108,0.12) 0%, transparent 70%);
    }
    .auth-box {
      width: 100%; max-width: 460px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2.5rem;
    }
    .auth-logo { text-align: center; margin-bottom: 2rem; }
    .auth-logo a {
      font-family: var(--font-display); font-size: 1.5rem;
      font-weight: 800; color: var(--green-neon); text-decoration: none;
    }
    .auth-logo p { color: var(--muted); font-size: 0.9rem; margin-top: 0.4rem; }
    .auth-title { font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; margin-bottom: 0.3rem; }
    .auth-sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.8rem; }
    .auth-footer { text-align: center; margin-top: 1.5rem; font-size: 0.88rem; color: var(--muted); }
    .strength-bar { display: flex; gap: 4px; margin-top: 0.4rem; }
    .strength-seg {
      flex: 1; height: 4px; border-radius: 2px;
      background: var(--border); transition: background 0.3s;
    }
    .strength-seg.weak   { background: var(--red); }
    .strength-seg.medium { background: var(--amber); }
    .strength-seg.strong { background: var(--green-bright); }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="/" class="nav-brand"><span>🌿</span> EcoTrace</a>
  </nav>

  <div class="auth-wrap">
    <div class="auth-box">
      <div class="auth-logo">
        <a href="/">🌿 EcoTrace</a>
        <p>Carbon Footprint Logger</p>
      </div>

      <h1 class="auth-title">Create your account</h1>
      <p class="auth-sub">Join thousands tracking and reducing their carbon footprint.</p>

      <div id="alertBox"></div>

      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" id="username" class="form-input" placeholder="e.g. eco_jane" autocomplete="username">
        <p class="form-hint">3–30 characters, letters and numbers.</p>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="email" class="form-input" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-input" placeholder="Min. 6 characters" autocomplete="new-password">
        <div class="strength-bar">
          <div class="strength-seg" id="s1"></div>
          <div class="strength-seg" id="s2"></div>
          <div class="strength-seg" id="s3"></div>
          <div class="strength-seg" id="s4"></div>
        </div>
      </div>

      <button id="registerBtn" class="btn btn-primary btn-full mt-2" style="font-size:1rem; padding: 0.8rem;">
        Create Account
      </button>

      <div class="auth-footer">
        Already have an account? <a href="/login">Sign in</a>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    redirectIfLoggedIn();

    const alertBox  = document.getElementById('alertBox');
    const regBtn    = document.getElementById('registerBtn');
    const passInput = document.getElementById('password');
    const segs      = [document.getElementById('s1'), document.getElementById('s2'),
                       document.getElementById('s3'), document.getElementById('s4')];

    function showAlert(msg, type = 'error') {
      alertBox.innerHTML = `<div class="alert alert-${type}"><span>${type === 'error' ? '⚠' : '✓'}</span>${msg}</div>`;
    }

    // Password strength indicator
    passInput.addEventListener('input', () => {
      const v = passInput.value;
      let score = 0;
      if (v.length >= 6) score++;
      if (v.length >= 10) score++;
      if (/[A-Z]/.test(v) && /[0-9]/.test(v)) score++;
      if (/[^A-Za-z0-9]/.test(v)) score++;

      const cls = score <= 1 ? 'weak' : score === 2 ? 'weak' : score === 3 ? 'medium' : 'strong';
      segs.forEach((s, i) => {
        s.className = 'strength-seg';
        if (i < score) s.classList.add(cls);
      });
    });

    async function doRegister() {
      const username = document.getElementById('username').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = passInput.value;

      if (!username || !email || !password) { showAlert('Please fill in all fields.'); return; }
      if (password.length < 6) { showAlert('Password must be at least 6 characters.'); return; }

      regBtn.disabled = true;
      regBtn.textContent = 'Creating account…';
      alertBox.innerHTML = '';

      try {
        const res = await API.auth.register({ username, email, password });
        API.setToken(res.token);
        API.setUser(res.user);
        window.location.href = '/dashboard';
      } catch (err) {
        showAlert(err.message || 'Registration failed. Please try again.');
        regBtn.disabled = false;
        regBtn.textContent = 'Create Account';
      }
    }

    regBtn.addEventListener('click', doRegister);
    document.querySelectorAll('.form-input').forEach(el => {
      el.addEventListener('keydown', (e) => { if (e.key === 'Enter') doRegister(); });
    });
  </script>
</body>
</html>
